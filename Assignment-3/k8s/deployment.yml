apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app-deployment
  labels:
    app: demo-app
  annotations:
    kubernetes.io/change-cause: "Initial deployment v1"
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      containers:
        - name: demo-app
          image: docker.io/library/k8s-app:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 80